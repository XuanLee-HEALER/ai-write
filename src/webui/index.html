<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-write — AI writing, made visible</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1d212a;
      --border: #2a2f3a;
      --fg: #e6e9ef;
      --muted: #8b93a3;
      --accent: #6ea8fe;
      --accent-dim: #3a5a8c;
      --ok: #4ec9a4;
      --warn: #e6b450;
      --err: #e06c75;
      --tool: #c198f0;
      --commit: #4ec9a4;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      padding: .7rem 1.1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
    header .sub { color: var(--muted); font-size: .82rem; }
    header .conn {
      margin-left: auto;
      font-size: .78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .dot { width: .55rem; height: .55rem; border-radius: 50%; background: var(--muted); }
    .dot.live { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .dot.down { background: var(--err); }

    main {
      display: grid;
      grid-template-columns: 240px 1fr 340px;
      gap: 1px;
      background: var(--border);
      height: calc(100vh - 49px);
    }
    .col {
      background: var(--bg);
      overflow-y: auto;
      padding: .9rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: .5rem;
      padding: .8rem;
    }
    .card h2 {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 0 0 .6rem;
      font-weight: 600;
    }

    /* ---- left: tree ---- */
    .theme { margin-bottom: .35rem; }
    .theme > .theme-name {
      cursor: pointer;
      font-weight: 600;
      padding: .25rem .35rem;
      border-radius: .3rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .theme > .theme-name:hover { background: var(--panel-2); }
    .arts { margin: .1rem 0 .4rem .9rem; border-left: 1px solid var(--border); padding-left: .5rem; }
    .art {
      cursor: pointer;
      padding: .2rem .4rem;
      border-radius: .3rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .art:hover { background: var(--panel-2); color: var(--fg); }
    .art.active { background: var(--accent-dim); color: #fff; }
    .empty { color: var(--muted); font-style: italic; font-size: .82rem; }

    /* ---- forms ---- */
    label { display: block; font-size: .78rem; color: var(--muted); margin: .5rem 0 .2rem; }
    input, textarea, button, select {
      font: inherit;
      color: var(--fg);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: .35rem;
      padding: .4rem .5rem;
      width: 100%;
    }
    textarea { resize: vertical; min-height: 4.5rem; }
    button {
      cursor: pointer;
      width: auto;
      background: var(--accent);
      color: #0b1220;
      border: none;
      font-weight: 600;
      padding: .45rem .9rem;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .5; cursor: default; }
    button.ghost { background: var(--panel-2); color: var(--fg); border: 1px solid var(--border); }
    .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }

    /* ---- center ---- */
    .article-head { display: flex; align-items: baseline; gap: .6rem; }
    .article-head .path { font-family: var(--mono); color: var(--accent); }
    .article-body {
      font-family: var(--mono);
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: .4rem;
      padding: .7rem;
      max-height: 38vh;
      overflow-y: auto;
      font-size: .85rem;
    }

    /* ---- timeline ---- */
    #timeline { display: flex; flex-direction: column; gap: .35rem; max-height: 46vh; overflow-y: auto; }
    .ev {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .5rem;
      padding: .35rem .5rem;
      border-radius: .35rem;
      background: var(--panel-2);
      border-left: 3px solid var(--border);
      font-size: .83rem;
      animation: slidein .18s ease-out;
    }
    @keyframes slidein { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
    .ev .tag {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      align-self: start;
      padding-top: .1rem;
    }
    .ev .body { min-width: 0; }
    .ev .body .detail { color: var(--muted); font-family: var(--mono); font-size: .78rem; white-space: pre-wrap; word-break: break-word; }
    .ev.round { border-left-color: var(--accent); }
    .ev.round .tag { color: var(--accent); }
    .ev.model { border-left-color: #5c6370; }
    .ev.tool { border-left-color: var(--tool); }
    .ev.tool .tag { color: var(--tool); }
    .ev.result-ok { border-left-color: var(--ok); }
    .ev.result-err { border-left-color: var(--err); }
    .ev.result-err .tag { color: var(--err); }
    .ev.commit { border-left-color: var(--commit); }
    .ev.commit .tag { color: var(--commit); }
    .ev.slave { border-left-color: var(--warn); }
    .ev.slave .tag { color: var(--warn); }
    .ev.finished { border-left-color: var(--ok); background: #1a2620; }
    .ev.finished.failed { border-left-color: var(--err); background: #281a1c; }
    .ev.finished.need_human { border-left-color: var(--warn); background: #282318; }
    .sha { font-family: var(--mono); color: var(--commit); }

    /* ---- right: versions ---- */
    .commit-item {
      padding: .4rem .5rem;
      border-radius: .35rem;
      border: 1px solid var(--border);
      margin-bottom: .35rem;
      cursor: pointer;
      background: var(--panel-2);
    }
    .commit-item:hover { border-color: var(--accent-dim); }
    .commit-item .msg { font-size: .82rem; }
    .commit-item .meta { font-size: .72rem; color: var(--muted); display: flex; justify-content: space-between; gap: .4rem; margin-top: .15rem; }
    .commit-item .meta .id { font-family: var(--mono); color: var(--accent); }
    .commit-item input[type=checkbox] { width: auto; margin-right: .4rem; }
    .diff {
      font-family: var(--mono);
      font-size: .76rem;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: .4rem;
      padding: .6rem;
      max-height: 32vh;
      overflow: auto;
    }
    .diff .add { color: var(--ok); }
    .diff .del { color: var(--err); }
    .diff .hunk { color: var(--accent); }
    .diff .meta-line { color: var(--muted); }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: .55rem .9rem;
      border-radius: .4rem;
      font-size: .85rem;
      box-shadow: 0 4px 18px rgba(0,0,0,.4);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      z-index: 10;
    }
    .toast.show { opacity: 1; }
    .toast.err { border-color: var(--err); }
  </style>
</head>
<body>
  <header>
    <h1>ai-write</h1>
    <span class="sub">AI writing, made visible</span>
    <span class="conn"><span id="conn-dot" class="dot"></span><span id="conn-text">connecting…</span></span>
  </header>

  <main>
    <!-- LEFT: theme / article tree -->
    <section class="col" id="left">
      <div class="card">
        <h2>Workspace
          <button class="ghost" id="refresh-tree" style="float:right;font-size:.7rem;padding:.1rem .4rem;">↻</button>
        </h2>
        <div id="tree"><div class="empty">loading…</div></div>
      </div>
    </section>

    <!-- CENTER: new writing + live operations + article content -->
    <section class="col" id="center">
      <div class="card">
        <h2>New writing run</h2>
        <label for="f-theme">Theme</label>
        <input id="f-theme" placeholder="e.g. rust" autocomplete="off">
        <label for="f-file">File</label>
        <input id="f-file" placeholder="e.g. intro.md" autocomplete="off">
        <label for="f-task">Task</label>
        <textarea id="f-task" placeholder="Describe what the AI should write…"></textarea>
        <div class="row" style="margin-top:.6rem;">
          <button id="start-btn">Start writing</button>
          <span id="task-note" class="empty"></span>
        </div>
      </div>

      <div class="card">
        <h2>AI operations
          <button class="ghost" id="clear-timeline" style="float:right;font-size:.7rem;padding:.1rem .4rem;">clear</button>
        </h2>
        <div id="timeline"><div class="empty">No activity yet. Start a writing run to watch the AI work.</div></div>
      </div>

      <div class="card">
        <div class="article-head">
          <h2 style="margin:0;">Article</h2>
          <span class="path" id="article-path"></span>
        </div>
        <div class="article-body" id="article-body" style="margin-top:.6rem;"><div class="empty">Select an article on the left to view it.</div></div>
      </div>
    </section>

    <!-- RIGHT: versions / diff / undo -->
    <section class="col" id="right">
      <div class="card">
        <h2>Versions
          <button class="ghost" id="undo-btn" style="float:right;font-size:.7rem;padding:.1rem .5rem;" disabled>Undo last</button>
        </h2>
        <div id="history"><div class="empty">No article selected.</div></div>
      </div>
      <div class="card">
        <h2>Diff
          <button class="ghost" id="diff-btn" style="float:right;font-size:.7rem;padding:.1rem .5rem;" disabled>Compare ✓</button>
        </h2>
        <div id="diff"><div class="empty">Tick two versions above, then Compare.</div></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

<script>
"use strict";
//-------------------------------------------------------------------
// State
//-------------------------------------------------------------------
const state = {
  theme: null,        // currently selected theme
  file: null,         // currently selected article file
  openThemes: new Set(),
  selectedCommits: [],// commit ids ticked for diff (max 2)
};

const $ = (id) => document.getElementById(id);
const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

function toast(msg, isErr) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.className = "toast"; }, 3000);
}

async function api(path, opts) {
  const res = await fetch(path, opts);
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { /* non-JSON */ }
  if (!res.ok) {
    const m = (data && data.error) ? data.error : (text || res.statusText);
    throw new Error(m);
  }
  return data;
}

//-------------------------------------------------------------------
// Left tree: themes + articles
//-------------------------------------------------------------------
async function loadTree() {
  const treeEl = $("tree");
  try {
    const { themes } = await api("/api/themes");
    treeEl.innerHTML = "";
    if (!themes.length) { treeEl.appendChild(el("div", "empty", "No themes yet.")); return; }
    for (const theme of themes) {
      const wrap = el("div", "theme");
      const name = el("div", "theme-name");
      name.appendChild(el("span", null, state.openThemes.has(theme) ? "▾" : "▸"));
      name.appendChild(el("span", null, theme));
      const arts = el("div", "arts");
      arts.style.display = state.openThemes.has(theme) ? "block" : "none";
      name.onclick = async () => {
        if (state.openThemes.has(theme)) {
          state.openThemes.delete(theme);
          arts.style.display = "none";
          name.firstChild.textContent = "▸";
        } else {
          state.openThemes.add(theme);
          name.firstChild.textContent = "▾";
          arts.style.display = "block";
          await loadArticles(theme, arts);
        }
      };
      wrap.appendChild(name);
      wrap.appendChild(arts);
      treeEl.appendChild(wrap);
      if (state.openThemes.has(theme)) await loadArticles(theme, arts);
    }
  } catch (e) {
    treeEl.innerHTML = "";
    treeEl.appendChild(el("div", "empty", "error: " + e.message));
  }
}

async function loadArticles(theme, container) {
  container.innerHTML = "";
  container.dataset.theme = theme;
  try {
    const { articles } = await api(`/api/themes/${encodeURIComponent(theme)}/articles`);
    if (!articles.length) { container.appendChild(el("div", "empty", "no articles")); return; }
    for (const file of articles) {
      const a = el("div", "art", file);
      if (state.theme === theme && state.file === file) a.classList.add("active");
      a.onclick = () => selectArticle(theme, file);
      container.appendChild(a);
    }
  } catch (e) {
    container.appendChild(el("div", "empty", "error: " + e.message));
  }
}

//-------------------------------------------------------------------
// Center: article content
//-------------------------------------------------------------------
async function selectArticle(theme, file) {
  state.theme = theme;
  state.file = file;
  state.selectedCommits = [];
  // highlight the clicked article in the tree
  document.querySelectorAll(".art").forEach(a => {
    a.classList.toggle("active", a.textContent === file && a.parentElement.dataset.theme === theme);
  });
  $("article-path").textContent = `${theme}/${file}`;
  await refreshArticle();
  await loadHistory();
  $("diff").innerHTML = "";
  $("diff").appendChild(el("div", "empty", "Tick two versions above, then Compare."));
}

async function refreshArticle() {
  if (!state.theme || !state.file) return;
  const body = $("article-body");
  try {
    const { content } = await api(`/api/articles/${encodeURIComponent(state.theme)}/${encodeURIComponent(state.file)}`);
    body.textContent = content || "(empty)";
  } catch (e) {
    body.innerHTML = "";
    body.appendChild(el("div", "empty", "error: " + e.message));
  }
}

//-------------------------------------------------------------------
// Right: history, diff, undo
//-------------------------------------------------------------------
async function loadHistory() {
  const histEl = $("history");
  const undoBtn = $("undo-btn");
  if (!state.theme || !state.file) {
    histEl.innerHTML = ""; histEl.appendChild(el("div", "empty", "No article selected."));
    undoBtn.disabled = true;
    return;
  }
  try {
    const { history } = await api(`/api/articles/${encodeURIComponent(state.theme)}/${encodeURIComponent(state.file)}/history`);
    histEl.innerHTML = "";
    if (!history || !history.length) { histEl.appendChild(el("div", "empty", "No commits yet.")); undoBtn.disabled = true; return; }
    undoBtn.disabled = history.length < 2;
    for (const c of history) {
      const item = el("div", "commit-item");
      const top = el("div", "msg");
      const cb = el("input"); cb.type = "checkbox"; cb.value = c.id;
      cb.checked = state.selectedCommits.includes(c.id);
      cb.onclick = (e) => { e.stopPropagation(); toggleCommit(c.id, cb); };
      top.appendChild(cb);
      top.appendChild(document.createTextNode(c.message || "(no message)"));
      const meta = el("div", "meta");
      meta.appendChild(el("span", "id", c.id.slice(0, 8)));
      meta.appendChild(el("span", null, `${stripEmail(c.author)} · ${fmtTime(c.time)}`));
      item.appendChild(top);
      item.appendChild(meta);
      histEl.appendChild(item);
    }
    updateDiffBtn();
  } catch (e) {
    histEl.innerHTML = ""; histEl.appendChild(el("div", "empty", "error: " + e.message));
    undoBtn.disabled = true;
  }
}

function toggleCommit(id, cb) {
  const i = state.selectedCommits.indexOf(id);
  if (i >= 0) { state.selectedCommits.splice(i, 1); }
  else {
    state.selectedCommits.push(id);
    if (state.selectedCommits.length > 2) {
      const dropped = state.selectedCommits.shift();
      document.querySelectorAll('#history input[type=checkbox]').forEach(x => { if (x.value === dropped) x.checked = false; });
    }
  }
  updateDiffBtn();
}

function updateDiffBtn() {
  $("diff-btn").disabled = state.selectedCommits.length !== 2;
}

async function runDiff() {
  if (state.selectedCommits.length !== 2) return;
  // Order: older (from) → newer (to). History is newest-first, so the one
  // appearing later in the list is older. We just send them; from = second tick.
  const [a, b] = state.selectedCommits;
  const diffEl = $("diff");
  try {
    const url = `/api/articles/${encodeURIComponent(state.theme)}/${encodeURIComponent(state.file)}/diff`
      + `?from=${encodeURIComponent(a)}&to=${encodeURIComponent(b)}`;
    const { diff } = await api(url);
    renderDiff(diff);
  } catch (e) {
    diffEl.innerHTML = ""; diffEl.appendChild(el("div", "empty", "error: " + e.message));
  }
}

function renderDiff(patch) {
  const diffEl = $("diff");
  diffEl.innerHTML = "";
  if (!patch || !patch.trim()) { diffEl.appendChild(el("div", "empty", "No differences.")); return; }
  const pre = el("div", "diff");
  for (const line of patch.split("\n")) {
    const span = el("div");
    if (line.startsWith("+++") || line.startsWith("---") || line.startsWith("diff ") || line.startsWith("index ")) span.className = "meta-line";
    else if (line.startsWith("@@")) span.className = "hunk";
    else if (line.startsWith("+")) span.className = "add";
    else if (line.startsWith("-")) span.className = "del";
    span.textContent = line;
    pre.appendChild(span);
  }
  diffEl.appendChild(pre);
}

async function runUndo() {
  if (!state.theme || !state.file) return;
  if (!confirm(`Undo the last edit to ${state.theme}/${state.file}? This records a revert commit.`)) return;
  try {
    const res = await api(`/api/articles/${encodeURIComponent(state.theme)}/${encodeURIComponent(state.file)}/undo`, { method: "POST" });
    if (res && res.undone === false) {
      toast(res.reason || "Nothing to undo.");
    } else {
      toast("Undone → " + (res.committed || "ok"));
      await refreshArticle();
      await loadHistory();
    }
  } catch (e) {
    toast("undo failed: " + e.message, true);
  }
}

//-------------------------------------------------------------------
// New writing run
//-------------------------------------------------------------------
async function startTask() {
  const theme = $("f-theme").value.trim();
  const file = $("f-file").value.trim();
  const task = $("f-task").value.trim();
  if (!theme || !file || !task) { toast("Fill in theme, file, and task.", true); return; }
  const btn = $("start-btn");
  btn.disabled = true;
  try {
    const res = await api("/api/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ theme, file, task }),
    });
    $("task-note").textContent = `task #${res.task_id} started — watch the operations panel`;
    clearTimeline(`Started task #${res.task_id}: ${theme}/${file}`);
    // Track the target so EditCommitted/Finished can refresh the right article.
    state.theme = theme;
    state.file = file;
    $("article-path").textContent = `${theme}/${file}`;
    state.openThemes.add(theme);
  } catch (e) {
    toast("could not start: " + e.message, true);
  } finally {
    btn.disabled = false;
  }
}

//-------------------------------------------------------------------
// SSE: live AI operation stream
//-------------------------------------------------------------------
// Events are externally-tagged enum JSON, e.g. {"RoundStarted":{"round":1}}.
function connectEvents() {
  const src = new EventSource("/api/events");
  src.onopen = () => setConn("live", "live");
  src.onerror = () => setConn("down", "reconnecting…");
  src.onmessage = (msg) => {
    let payload;
    try { payload = JSON.parse(msg.data); } catch { return; }
    const kind = Object.keys(payload)[0];
    handleEvent(kind, payload[kind]);
  };
}

function setConn(cls, text) {
  $("conn-dot").className = "dot " + cls;
  $("conn-text").textContent = text;
}

function clearTimeline(seedMsg) {
  const tl = $("timeline");
  tl.innerHTML = "";
  if (seedMsg) addEvent("round", "RUN", seedMsg, null);
}

function handleEvent(kind, data) {
  switch (kind) {
    case "SessionStarted":
      addEvent("model", "SESSION", `${data.role} started`, data.system_excerpt);
      break;
    case "RoundStarted":
      addEvent("round", `ROUND ${data.round}`, "new round", null);
      break;
    case "ModelMessage":
      addEvent("model", "MODEL", "assistant", data.text);
      break;
    case "ToolCalled":
      addEvent("tool", "TOOL →", data.name, jsonPreview(data.args));
      break;
    case "ToolResult":
      addEvent(data.ok ? "result-ok" : "result-err", data.ok ? "RESULT ✓" : "RESULT ✗", data.name, data.summary);
      break;
    case "EditCommitted": {
      const node = addEvent("commit", "COMMITTED", data.article, null);
      const d = el("div", "detail");
      d.appendChild(document.createTextNode("by " + stripEmail(data.author) + " @ "));
      d.appendChild(el("span", "sha", data.sha));
      node.querySelector(".body").appendChild(d);
      // An edit landed; refresh the displayed article if it is the one we track.
      if (sameArticle(data.article)) { refreshArticle(); loadHistory(); }
      break;
    }
    case "SlaveSpawned":
      addEvent("slave", "SLAVE +", `${data.theme}/${data.file}`, "writer: " + stripEmail(data.writer));
      break;
    case "SlaveReported":
      addEvent("slave", "SLAVE ⤶", data.status, data.summary);
      break;
    case "Finished": {
      const node = addEvent("finished", "FINISHED", data.outcome, null);
      node.classList.add(data.outcome);
      // Run done: refresh tree + the tracked article and its history.
      loadTree();
      refreshArticle();
      loadHistory();
      break;
    }
    default:
      addEvent("model", kind || "EVENT", JSON.stringify(data), null);
  }
}

function addEvent(cls, tag, title, detail) {
  const tl = $("timeline");
  // drop the "no activity" placeholder
  const ph = tl.querySelector(".empty");
  if (ph) ph.remove();
  const ev = el("div", "ev " + cls);
  ev.appendChild(el("div", "tag", tag));
  const body = el("div", "body");
  body.appendChild(el("div", null, title));
  if (detail != null && detail !== "") body.appendChild(el("div", "detail", detail));
  ev.appendChild(body);
  tl.appendChild(ev);
  tl.scrollTop = tl.scrollHeight;
  return ev;
}

//-------------------------------------------------------------------
// Helpers
//-------------------------------------------------------------------
function sameArticle(articlePath) {
  return state.theme && state.file && articlePath === `${state.theme}/${state.file}`;
}
function stripEmail(author) {
  // "name <a@b>" → "name"
  return (author || "").replace(/\s*<[^>]*>\s*$/, "").trim() || author;
}
function fmtTime(unixSecs) {
  if (!unixSecs) return "";
  try { return new Date(unixSecs * 1000).toLocaleString(); } catch { return ""; }
}
function jsonPreview(v) {
  if (v == null) return "";
  let s;
  try { s = typeof v === "string" ? v : JSON.stringify(v); } catch { s = String(v); }
  return s.length > 400 ? s.slice(0, 400) + "…" : s;
}

//-------------------------------------------------------------------
// Wire up
//-------------------------------------------------------------------
$("refresh-tree").onclick = loadTree;
$("start-btn").onclick = startTask;
$("clear-timeline").onclick = () => {
  $("timeline").innerHTML = "";
  $("timeline").appendChild(el("div", "empty", "Cleared."));
};
$("undo-btn").onclick = runUndo;
$("diff-btn").onclick = runDiff;

loadTree();
connectEvents();
</script>
</body>
</html>
